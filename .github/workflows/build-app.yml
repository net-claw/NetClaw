name: Build Application Image

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      build_app:
        description: Build the NetClaw app image
        required: false
        default: true
        type: boolean
      push_image:
        description: Push the image to Docker Hub
        required: false
        default: true
        type: boolean
      image_tag:
        description: Optional override tag for manual runs
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build-app:
    if: github.event_name == 'push' || inputs.build_app == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name and version tag
        id: meta
        shell: bash
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${{ vars.DOCKERHUB_IMAGE }}"

          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${OWNER}/${REPO}"
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA}"
          fi

          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.push_image }}" = "true" ]; then
            SHOULD_PUSH="true"
          else
            SHOULD_PUSH="false"
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "should_push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.meta.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish app image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.meta.outputs.should_push }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image_name }}:latest

      - name: Show published image details
        if: steps.meta.outputs.should_push == 'true'
        shell: bash
        run: |
          echo "Image: ${{ steps.meta.outputs.image_name }}"
          echo "Tag: ${{ steps.meta.outputs.version_tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          docker buildx imagetools inspect "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.version_tag }}"
